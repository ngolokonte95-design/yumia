<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #1a1a2e; display: flex; gap: 24px; padding: 32px; align-items: flex-start; }
  .box { text-align: center; color: white; font-family: sans-serif; font-size: 12px; }
  img { display: block; border-radius: 22%; }
</style>
</head>
<body>
  <div class="box">
    <img src="src/icon.svg" width="256" height="256">
    <p>icon 256px</p>
  </div>
  <div class="box">
    <img src="src/icon.svg" width="96" height="96">
    <p>icon 96px</p>
  </div>
  <div class="box">
    <img src="src/icon.svg" width="48" height="48">
    <p>icon 48px</p>
  </div>
</body>
</html>
