name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────
  # 1. Type-check API
  # ──────────────────────────────────────────────
  typecheck-api:
    name: Typecheck API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/api

  # ──────────────────────────────────────────────
  # 2. Type-check Mobile
  # ──────────────────────────────────────────────
  typecheck-mobile:
    name: Typecheck Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/mobile

  # ──────────────────────────────────────────────
  # 3. Unit tests API (Jest + Postgres)
  # ──────────────────────────────────────────────
  test-api:
    name: Unit Tests API
    runs-on: ubuntu-latest
    needs: typecheck-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yumia
          POSTGRES_PASSWORD: yumia
          POSTGRES_DB: yumia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://yumia:yumia@localhost:5432/yumia_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      AI_PROVIDER: mock
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        working-directory: apps/api

  # ──────────────────────────────────────────────
  # 3a. Unit tests Mobile (Jest — logique pure de lib/)
  # ──────────────────────────────────────────────
  test-mobile:
    name: Unit Tests Mobile
    runs-on: ubuntu-latest
    needs: typecheck-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run tests
        run: npm test
        working-directory: apps/mobile

  # ──────────────────────────────────────────────
  # 3b. E2E tests API (supertest + mocks — pas de DB réelle)
  # ──────────────────────────────────────────────
  e2e-api:
    name: E2E Tests API
    runs-on: ubuntu-latest
    needs: typecheck-api

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      AI_PROVIDER: mock
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run E2E tests (mocked infra)
        run: npm run test:e2e
        working-directory: apps/api

  # ──────────────────────────────────────────────
  # 4. Build API (vérification production)
  # ──────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [typecheck-api, test-api, e2e-api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Build
        run: npm run build
        working-directory: apps/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # 5. Validation config Expo + résolution des config plugins natifs.
  #    (expo export --platform web échouerait sur react-native-maps, natif-only ;
  #     expo config valide app.json + plugins, ce qui attrape les plugins invalides.)
  # ──────────────────────────────────────────────
  build-mobile:
    name: Mobile Config Check
    runs-on: ubuntu-latest
    needs: typecheck-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Validate Expo config & native plugin resolution
        run: npx expo config --type prebuild
        working-directory: apps/mobile

  # ──────────────────────────────────────────────
  # 6. EAS Update — OTA JS update (main uniquement)
  # ──────────────────────────────────────────────
  eas-update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: [build-mobile, test-mobile]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update to production channel
        run: npx eas-cli update --channel production --message "CI: ${{ github.sha }}" --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: https://api.yumia.app/api

  # ──────────────────────────────────────────────
  # 7. Build & push Docker image (main uniquement)
  # ──────────────────────────────────────────────
  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yumia-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
